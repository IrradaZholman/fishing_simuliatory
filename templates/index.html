<!DOCTYPE html>
<html>
<head>
    <title>Фишинг симулятор</title>
</head>
<body>

<h2>📩 Жаңа хабарлама</h2>

<button onclick="loadMessage()">Жаңа хабарлама алу</button>

<hr>

<p><b>Сервис:</b> <span id="service"></span></p>
<p><b>Email:</b> <span id="email"></span></p>
<p><b>Тақырып:</b> <span id="title"></span></p>
<p><b>Мәтін:</b> <span id="text"></span></p>
<p><b>Сілтеме:</b> <span id="link"></span></p>
<p><b>Уақыт:</b> <span id="time"></span></p>
<p><b>Күні:</b> <span id="date"></span></p>

<script>
async function loadMessage() {
    try {
        let res = await fetch("/get-message");
        let data = await res.json();

        document.getElementById("service").innerText = data.service;
        document.getElementById("email").innerText = data.email;
        document.getElementById("title").innerText = data.title;
        document.getElementById("text").innerText = data.text;
        document.getElementById("link").innerText = data.link;
        document.getElementById("time").innerText = data.time;
        document.getElementById("date").innerText = data.date;

    } catch (e) {
        console.error("ERROR:", e);
        document.body.innerHTML = "Қате шықты: " + e;
    }
}

window.onload = loadMessage;
</script>

</body>
</html>
